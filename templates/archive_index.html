<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>n-digest archive</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    background: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #1d1d1f;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 64px; }
  h1 { font-size: 28px; margin: 0 0 6px; }
  p.lede { color: #6e6e73; margin: 0 0 32px; }
  ul.entries { list-style: none; padding: 0; margin: 0; }
  ul.entries li {
    background: #ffffff;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  ul.entries li a { color: inherit; text-decoration: none; display: block; }
  ul.entries li a:hover .headline { text-decoration: underline; }
  .date { font-size: 12px; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .headline { font-size: 16px; font-weight: 600; }
  .footer { margin-top: 40px; font-size: 12px; color: #8a8a8e; }
  .empty { color: #6e6e73; font-style: italic; }
  @media (prefers-color-scheme: dark) {
    body { background: #000; color: #f5f5f7; }
    ul.entries li { background: #1c1c1e; box-shadow: none; }
    .date, .footer, p.lede { color: #8e8e93; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>n-digest archive</h1>
    <p class="lede">Daily AI industry digest. Weekdays, 6:00 AM ET.</p>
    {% if entries %}
    <ul class="entries">
      {% for e in entries %}
      <li>
        <a href="{{ e.href }}">
          <div class="date">{{ e.date_pretty }}</div>
          <div class="headline">{{ e.headline }}</div>
        </a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No digests yet.</p>
    {% endif %}
    <p class="footer">Generated {{ generated_at }}</p>
  </div>
</body>
</html>
